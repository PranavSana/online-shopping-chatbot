{% extends "base.html" %}

{% block content %}
<div class="page-container">
    <h2 class="page-header">Admin Panel - Select a User</h2>

    <table class="admin-table">
        <thead>
            <tr>
                <th>User ID</th>
                <th>Username</th>
                <th>View Orders</th>
            </tr>
        </thead>
        <tbody>
            {% for user in users %}
            <tr>
                <td>{{ user.id }}</td>
                <td>{{ user.username }}</td>
                <td>
                    <a href="{{ url_for('admin_user_orders', user_id=user.id, password='secret') }}" class="btn-return">View Orders</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
