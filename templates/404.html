{% extends 'base.html' %}

{% block title %}Page Not Found - Shopsphere{% endblock %}

{% block content %}
<div class="error-container">
    <div class="error-content">
        <h1>404</h1>
        <h2>Oops! Page Not Found</h2>
        <p>The page you're looking for doesn't exist or has been moved.</p>
        <a href="{{ url_for('home') }}" class="btn btn-primary">Back to Home</a>
    </div>
</div>

<style>
.error-container {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 600px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
}

.error-content {
    text-align: center;
    color: white;
}

.error-content h1 {
    font-size: 120px;
    margin: 0;
    font-weight: bold;
}

.error-content h2 {
    font-size: 32px;
    margin: 20px 0;
}

.error-content p {
    font-size: 18px;
    margin-bottom: 30px;
}
</style>
{% endblock %}
